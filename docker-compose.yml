services:
  postgres:
    image: postgres:16
    container_name: career-pilot-postgres
    environment:
      POSTGRES_DB: career_pilot_ai
      POSTGRES_USER: career_user
      POSTGRES_PASSWORD: career_password
    ports:
      - "5432:5432"
    volumes:
      - career_pilot_pg:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  career_pilot_pg:

